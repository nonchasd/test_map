<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map - California</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        html,
        body,
        #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
    </style>
<link rel="icon" href="/favicon.png"><script defer>(()=>{"use strict";console.log("TEST")})();</script><style>body{color:#fff;background-image:linear-gradient(#020917,#101725);margin:0;font-family:Inter,Avenir,Helvetica,Arial,sans-serif}</style></head>

<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([36.7783, -119.4179], 6);

        const testIcon = L.divIcon({
            className: 'custom-svg-marker',
            html: `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
            <path fill="#e74c3c" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
    `,
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        L.marker([33.782581, -118.189319]).addTo(map)
            .bindPopup('California 0');

        L.marker([33.774109, -118.189319], { icon: testIcon }).addTo(map)
            .bindPopup('California 1');

        L.polygon([
            [33.835408, -118.257158],
            [33.835408, -118.248478],
            [33.831701, -118.248489],
            [33.831701, -118.257179],
        ]).addTo(map).bindPopup('Something has happened here').openPopup();
    </script>
</body>

</html>
